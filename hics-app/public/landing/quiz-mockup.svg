<svg width="960" height="640" viewBox="0 0 960 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F0C14"/>
      <stop offset="1" stop-color="#16121E"/>
    </linearGradient>
    <linearGradient id="hero-grad" x1="0" y1="0" x2="0" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A0A2E"/>
      <stop offset="1" stop-color="#1A1421"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="360" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F9F1DB"/>
      <stop offset="0.4" stop-color="#C7AB70"/>
      <stop offset="0.7" stop-color="#7B688D"/>
      <stop offset="1" stop-color="#5EA5A0"/>
    </linearGradient>
    <linearGradient id="prog-bg" x1="640" y1="0" x2="920" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A855F7" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#5EA5A0" stop-opacity="0.7"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="white" stroke-width="0.3" stroke-opacity="0.07"/>
    </pattern>
  </defs>

  <!-- shell -->
  <rect width="960" height="640" rx="20" fill="url(#bg)"/>

  <!-- navbar -->
  <rect width="960" height="48" fill="#120F18"/>
  <rect width="960" height="1" y="48" fill="#2A2237"/>
  <rect x="16" y="10" width="28" height="28" rx="6" fill="white" fill-opacity="0.9"/>
  <rect x="19" y="13" width="22" height="22" rx="4" fill="#1B4F72"/>
  <text x="30" y="27" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="800" fill="white">H</text>
  <text x="54" y="29" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#F9F1DB">NyxHICSlab</text>
  <text x="200" y="29" font-family="system-ui,sans-serif" font-size="11" fill="#C9BC9F" fill-opacity="0.5">Dashboard</text>
  <text x="270" y="29" font-family="system-ui,sans-serif" font-size="11" fill="#C9BC9F" fill-opacity="0.5">Roles</text>
  <text x="315" y="29" font-family="system-ui,sans-serif" font-size="11" fill="#C9BC9F" fill-opacity="0.5">Scenarios</text>
  <text x="395" y="29" font-family="system-ui,sans-serif" font-size="11" fill="#C9BC9F" font-weight="600">Quiz</text>
  <circle cx="391" cy="38" r="2" fill="#A855F7"/>
  <rect x="760" y="11" width="180" height="26" rx="6" fill="#1D182A" stroke="#3A2E4A" stroke-width="1"/>
  <circle cx="776" cy="24" r="4" fill="#5EA5A0"/>
  <text x="786" y="28" font-family="system-ui,sans-serif" font-size="9" fill="#C9BC9F" fill-opacity="0.8">North Campus · 26m session</text>

  <!-- hero -->
  <rect x="0" y="48" width="960" height="110" fill="url(#hero-grad)"/>
  <rect x="0" y="48" width="960" height="110" fill="url(#grid)"/>
  <ellipse cx="840" cy="90" rx="140" ry="90" fill="#A855F7" fill-opacity="0.08"/>
  <text x="40" y="84" font-family="system-ui,sans-serif" font-size="19" font-weight="700" fill="white">Knowledge Quiz</text>
  <rect x="40" y="90" width="360" height="4" rx="2" fill="url(#metal)"/>
  <rect x="40" y="104" width="160" height="20" rx="5" fill="#A855F7" fill-opacity="0.15" stroke="#A855F7" stroke-opacity="0.4" stroke-width="1"/>
  <text x="120" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#C084FC">Emergency Management</text>
  <rect x="214" y="104" width="110" height="20" rx="5" fill="#5EA5A0" fill-opacity="0.12" stroke="#5EA5A0" stroke-opacity="0.4" stroke-width="1"/>
  <text x="269" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" fill="#5EA5A0">48 Questions</text>

  <!-- progress bar -->
  <text x="40" y="145" font-family="system-ui,sans-serif" font-size="10" fill="white" fill-opacity="0.45">Question 18 of 48</text>
  <rect x="40" y="153" width="720" height="6" rx="3" fill="#2A2237"/>
  <rect x="40" y="153" width="270" height="6" rx="3" fill="url(#prog-bg)"/>
  <text x="772" y="161" font-family="system-ui,sans-serif" font-size="10" fill="#A855F7">37%</text>

  <!-- right: score widget (background) -->
  <rect x="638" y="172" width="290" height="440" rx="14" fill="#1D182A" stroke="#2E2840" stroke-width="1"/>

  <!-- Score ring area -->
  <rect x="654" y="190" width="258" height="130" rx="10" fill="#241C2D" stroke="#3A2E4A" stroke-width="1"/>
  <text x="762" y="212" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="white" fill-opacity="0.4" font-weight="600" letter-spacing="0.1em">CURRENT SCORE</text>
  <!-- big score circle -->
  <circle cx="720" cy="278" r="42" fill="none" stroke="#2A2237" stroke-width="8"/>
  <circle cx="720" cy="278" r="42" fill="none" stroke="#A855F7" stroke-width="6" stroke-linecap="round" stroke-dasharray="110 155"/>
  <text x="720" y="272" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="800" fill="white">14</text>
  <text x="720" y="288" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="white" fill-opacity="0.4">of 17</text>
  <!-- accuracy text -->
  <text x="780" y="266" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#C084FC">82%</text>
  <text x="780" y="280" font-family="system-ui,sans-serif" font-size="9" fill="white" fill-opacity="0.4">accuracy</text>

  <!-- Categories breakdown -->
  <rect x="654" y="332" width="258" height="160" rx="10" fill="#241C2D" stroke="#3A2E4A" stroke-width="1"/>
  <text x="664" y="352" font-family="system-ui,sans-serif" font-size="10" fill="white" fill-opacity="0.4" font-weight="600" letter-spacing="0.1em">BY CATEGORY</text>
  <!-- Category rows -->
  <text x="664" y="374" font-family="system-ui,sans-serif" font-size="10" fill="white" fill-opacity="0.6">Emergency Mgmt</text>
  <rect x="664" y="378" width="184" height="5" rx="2.5" fill="#2A2237"/>
  <rect x="664" y="378" width="155" height="5" rx="2.5" fill="#A855F7" fill-opacity="0.75"/>
  <text x="856" y="385" text-anchor="end" font-family="system-ui,sans-serif" font-size="9" fill="#C084FC">84%</text>

  <text x="664" y="404" font-family="system-ui,sans-serif" font-size="10" fill="white" fill-opacity="0.6">Triage Protocols</text>
  <rect x="664" y="408" width="184" height="5" rx="2.5" fill="#2A2237"/>
  <rect x="664" y="408" width="136" height="5" rx="2.5" fill="#5EA5A0" fill-opacity="0.75"/>
  <text x="856" y="415" text-anchor="end" font-family="system-ui,sans-serif" font-size="9" fill="#5EA5A0">74%</text>

  <text x="664" y="434" font-family="system-ui,sans-serif" font-size="10" fill="white" fill-opacity="0.6">HICS Structure</text>
  <rect x="664" y="438" width="184" height="5" rx="2.5" fill="#2A2237"/>
  <rect x="664" y="438" width="170" height="5" rx="2.5" fill="#C7AB70" fill-opacity="0.75"/>
  <text x="856" y="445" text-anchor="end" font-family="system-ui,sans-serif" font-size="9" fill="#C7AB70">92%</text>

  <text x="664" y="464" font-family="system-ui,sans-serif" font-size="10" fill="white" fill-opacity="0.6">Safety Incidents</text>
  <rect x="664" y="468" width="184" height="5" rx="2.5" fill="#2A2237"/>
  <rect x="664" y="468" width="118" height="5" rx="2.5" fill="#EF4444" fill-opacity="0.65"/>
  <text x="856" y="475" text-anchor="end" font-family="system-ui,sans-serif" font-size="9" fill="#F87171">64%</text>

  <!-- left: question panel -->
  <rect x="32" y="172" width="592" height="440" rx="14" fill="#1D182A" stroke="#2E2840" stroke-width="1"/>

  <!-- question number + category badge -->
  <text x="56" y="202" font-family="system-ui,sans-serif" font-size="11" fill="white" fill-opacity="0.4" font-weight="600" letter-spacing="0.12em">QUESTION 18</text>
  <rect x="170" y="189" width="130" height="20" rx="5" fill="#A855F7" fill-opacity="0.15" stroke="#A855F7" stroke-opacity="0.4" stroke-width="1"/>
  <text x="235" y="203" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#C084FC">Emergency Management</text>

  <!-- question text -->
  <text x="56" y="238" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="white">Under HICS, which position is responsible for</text>
  <text x="56" y="258" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="white">coordinating patient tracking and family liaison</text>
  <text x="56" y="278" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="white">services during a disaster activation?</text>

  <!-- Answer options: 4 options, one correct (revealed) -->
  <!-- Option 1 - wrong (selected, red) -->
  <rect x="56" y="304" width="546" height="50" rx="10" fill="#450A0A" fill-opacity="0.4" stroke="#EF4444" stroke-opacity="0.55" stroke-width="1.5"/>
  <rect x="72" y="320" width="18" height="18" rx="4" fill="#EF4444" fill-opacity="0.3" stroke="#EF4444" stroke-opacity="0.6" stroke-width="1"/>
  <text x="81" y="333" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#F87171">A</text>
  <text x="100" y="333" font-family="system-ui,sans-serif" font-size="11" fill="white" fill-opacity="0.75">Operations Section Chief</text>
  <text x="580" y="329" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#F87171">✗</text>

  <!-- Option 2 - correct answer revealed -->
  <rect x="56" y="364" width="546" height="50" rx="10" fill="#14532D" fill-opacity="0.35" stroke="#22C55E" stroke-opacity="0.6" stroke-width="1.5"/>
  <rect x="72" y="381" width="18" height="18" rx="4" fill="#22C55E" fill-opacity="0.3" stroke="#22C55E" stroke-opacity="0.7" stroke-width="1"/>
  <text x="81" y="394" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#22C55E">B</text>
  <text x="100" y="394" font-family="system-ui,sans-serif" font-size="11" fill="white">Patient Tracking/Family Liaison Officer (Logistics)</text>
  <text x="580" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#22C55E">✓</text>
  <rect x="380" y="369" width="88" height="17" rx="4" fill="#22C55E" fill-opacity="0.15"/>
  <text x="424" y="381" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#86EFAC">Correct Answer</text>

  <!-- Option 3 -->
  <rect x="56" y="424" width="546" height="46" rx="10" fill="#241C2D" stroke="#3A2E4A" stroke-width="1"/>
  <rect x="72" y="440" width="18" height="18" rx="4" fill="#2A2237" stroke="#3A2E4A" stroke-width="1"/>
  <text x="81" y="453" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="white" fill-opacity="0.4">C</text>
  <text x="100" y="453" font-family="system-ui,sans-serif" font-size="11" fill="white" fill-opacity="0.5">Hospital Incident Commander</text>

  <!-- Option 4 -->
  <rect x="56" y="480" width="546" height="46" rx="10" fill="#241C2D" stroke="#3A2E4A" stroke-width="1"/>
  <rect x="72" y="496" width="18" height="18" rx="4" fill="#2A2237" stroke="#3A2E4A" stroke-width="1"/>
  <text x="81" y="509" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="white" fill-opacity="0.4">D</text>
  <text x="100" y="509" font-family="system-ui,sans-serif" font-size="11" fill="white" fill-opacity="0.5">Finance / Administration Section Chief</text>

  <!-- Quip result banner -->
  <rect x="56" y="540" width="546" height="36" rx="8" fill="#EF4444" fill-opacity="0.07" stroke="#EF4444" stroke-opacity="0.2" stroke-width="1"/>
  <text x="329" y="563" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10.5" fill="#FCA5A5">"Close, but protocol had other plans. Training montage continues."</text>

  <!-- Next button -->
  <rect x="432" y="590" width="156" height="30" rx="8" fill="#C7AB70" fill-opacity="0.9"/>
  <text x="510" y="610" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#120F18">Next Question →</text>
</svg>
