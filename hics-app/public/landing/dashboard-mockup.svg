  <rect x="235" y="467" width="78" height="18" rx="5" fill="#F97316" fill-opacity="0.2"/>
  <text x="274" y="479" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#F97316">24/7 Available</text>
  <text x="52" y="496" font-family="system-ui,sans-serif" font-size="9.5" fill="white" fill-opacity="0.5">Ask questions and get instant answers</text>
  <text x="52" y="510" font-family="system-ui,sans-serif" font-size="9.5" fill="white" fill-opacity="0.5">about HICS protocols, procedures,</text>
  <text x="52" y="524" font-family="system-ui,sans-serif" font-size="9.5" fill="white" fill-opacity="0.5">and best practices from our AI assistant.</text>
  <rect x="52" y="578" width="100" height="22" rx="6" fill="#431407" fill-opacity="0.6"/>
  <text x="102" y="593" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#FDBA74">Ask the Assistant</text>

  <rect x="334" y="458" width="290" height="148" rx="12" fill="#1D182A" stroke="#2E2840" stroke-width="1"/>
  <rect x="334" y="458" width="4" height="148" rx="2" fill="#F59E0B"/>
