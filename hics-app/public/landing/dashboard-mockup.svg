  <ellipse cx="820" cy="80" rx="120" ry="80" fill="#3B82F6" fill-opacity="0.12"/>
  <ellipse cx="160" cy="160" rx="90" ry="60" fill="#1E3A6E" fill-opacity="0.4"/>

