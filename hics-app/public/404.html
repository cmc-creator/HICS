<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>HICS Training App</title>
    <script>
      // Single-page application redirect for GitHub Pages.
      // Encodes the current path into the query string so the main index.html
      // can restore it via the History API without a full page reload.
      // See: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // keep the '/HICS' segment
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
