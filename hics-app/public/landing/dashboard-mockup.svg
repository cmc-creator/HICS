  <circle cx="776" cy="24" r="4" fill="#5EA5A0"/>
  <text x="786" y="28" font-family="system-ui,sans-serif" font-size="9" fill="#C9BC9F" fill-opacity="0.8">North Campus · 28m session</text>

  <!-- dashboard hero banner -->
  <rect x="0" y="48" width="960" height="152" fill="url(#hero-grad)"/>
