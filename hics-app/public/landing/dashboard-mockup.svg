  <text x="656" y="336" font-family="system-ui,sans-serif" font-size="9.5" fill="white" fill-opacity="0.5">Test your HICS knowledge with</text>
  <text x="656" y="350" font-family="system-ui,sans-serif" font-size="9.5" fill="white" fill-opacity="0.5">scenario-based questions covering</text>
  <text x="656" y="364" font-family="system-ui,sans-serif" font-size="9.5" fill="white" fill-opacity="0.5">triage, protocols, and emergency mgmt.</text>
  <rect x="656" y="418" width="100" height="22" rx="6" fill="#3B0764" fill-opacity="0.6"/>
  <text x="706" y="433" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#C084FC">Start Quiz</text>

