  <rect x="556" y="467" width="68" height="18" rx="5" fill="#F59E0B" fill-opacity="0.2"/>
  <text x="590" y="479" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#F59E0B">Session Guide</text>
  <text x="354" y="496" font-family="system-ui,sans-serif" font-size="9.5" fill="white" fill-opacity="0.5">Launch guided setup, debrief prompts,</text>
  <text x="354" y="510" font-family="system-ui,sans-serif" font-size="9.5" fill="white" fill-opacity="0.5">and a practical 30-minute training flow</text>
  <text x="354" y="524" font-family="system-ui,sans-serif" font-size="9.5" fill="white" fill-opacity="0.5">for team leads and facilitators.</text>
  <rect x="354" y="578" width="100" height="22" rx="6" fill="#422006" fill-opacity="0.7"/>
  <text x="404" y="593" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#FCD34D">Open Quick Start</text>

  <rect x="636" y="458" width="292" height="148" rx="12" fill="#1D182A" stroke="#2E2840" stroke-width="1"/>
  <rect x="636" y="458" width="4" height="148" rx="2" fill="#64748B"/>
  <text x="656" y="480" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white">Training Reports</text>
  <rect x="840" y="467" width="74" height="18" rx="5" fill="#64748B" fill-opacity="0.3"/>
  <text x="877" y="479" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#CBD5E1">CSV Export</text>
  <text x="656" y="496" font-family="system-ui,sans-serif" font-size="9.5" fill="white" fill-opacity="0.5">Review completion trends, score</text>
  <text x="656" y="510" font-family="system-ui,sans-serif" font-size="9.5" fill="white" fill-opacity="0.5">performance, and export facilitator-</text>
  <text x="656" y="524" font-family="system-ui,sans-serif" font-size="9.5" fill="white" fill-opacity="0.5">friendly training records.</text>
  <rect x="656" y="578" width="100" height="22" rx="6" fill="#1E293B" fill-opacity="0.8"/>
  <text x="706" y="593" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8">View Reports</text>
