<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="6" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1728"/>
      <stop offset="0.5" stop-color="#1c324a"/>
      <stop offset="1" stop-color="#2a4a6b"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)"/>
  <rect x="5" y="5" width="54" height="54" rx="13" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <!-- Red cross arms -->
  <rect x="26" y="13" width="12" height="38" rx="4" fill="#e53e3e"/>
  <rect x="13" y="26" width="38" height="12" rx="4" fill="#e53e3e"/>
  <!-- White highlight on cross -->
  <rect x="27" y="13" width="4" height="38" rx="3" fill="rgba(255,255,255,0.18)"/>
  <rect x="13" y="27" width="38" height="4" rx="3" fill="rgba(255,255,255,0.18)"/>
