  <rect x="270" y="229" width="16" height="16" rx="4" fill="#22C55E" fill-opacity="0.5"/>
  <text x="298" y="239" font-family="system-ui,sans-serif" font-size="10" fill="white" fill-opacity="0.55">Training Scenarios</text>
  <text x="298" y="260" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="white">12</text>
