<svg width="960" height="640" viewBox="0 0 960 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shell-bg" x1="0" y1="0" x2="960" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F0C14"/>
      <stop offset="1" stop-color="#16121E"/>
    </linearGradient>
    <linearGradient id="hero-grad" x1="0" y1="0" x2="960" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E3A6E"/>
      <stop offset="1" stop-color="#1B4F72"/>
    </linearGradient>
    <linearGradient id="metal-line" x1="0" y1="0" x2="280" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F9F1DB"/>
      <stop offset="0.5" stop-color="#C7AB70"/>
      <stop offset="1" stop-color="#5EA5A0"/>
    </linearGradient>
    <linearGradient id="stat-blue" x1="0" y1="0" x2="0" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="stat-green" x1="0" y1="0" x2="0" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="stat-purple" x1="0" y1="0" x2="0" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A855F7" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#A855F7" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="stat-red" x1="0" y1="0" x2="0" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EF4444" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#EF4444" stop-opacity="0.06"/>
    </linearGradient>
    <!-- grid pattern -->
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="white" stroke-width="0.3" stroke-opacity="0.07"/>
    </pattern>
  </defs>

  <!-- outer shell -->
  <rect width="960" height="640" rx="20" fill="url(#shell-bg)"/>

  <!-- navbar -->
  <rect width="960" height="48" rx="0" fill="#120F18"/>
  <rect width="960" height="1" y="48" fill="#2A2237"/>
  <!-- nav logo box -->
  <rect x="16" y="8" width="32" height="32" rx="7" fill="white" fill-opacity="0.9"/>
  <rect x="20" y="12" width="24" height="24" rx="4" fill="#1B4F72"/>
  <text x="32" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="white" letter-spacing="0.5">H</text>
  <!-- nav brand -->
  <text x="58" y="29" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#F9F1DB" letter-spacing="0.3">NyxHICSlab</text>
  <!-- nav links -->
  <text x="200" y="29" font-family="system-ui,sans-serif" font-size="11" fill="#C9BC9F" fill-opacity="0.7">Dashboard</text>
  <text x="288" y="29" font-family="system-ui,sans-serif" font-size="11" fill="#C9BC9F" fill-opacity="0.5">Roles</text>
  <text x="340" y="29" font-family="system-ui,sans-serif" font-size="11" fill="#C9BC9F" fill-opacity="0.5">Scenarios</text>
  <text x="416" y="29" font-family="system-ui,sans-serif" font-size="11" fill="#C9BC9F" fill-opacity="0.5">Quiz</text>
