  <text x="354" y="364" font-family="system-ui,sans-serif" font-size="9.5" fill="white" fill-opacity="0.5">fires, and hazmat events.</text>
  <rect x="354" y="418" width="100" height="22" rx="6" fill="#14532D" fill-opacity="0.6"/>
